<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#c9a227" stroke-opacity="0.05" stroke-width="1" />
    </pattern>
    <radialGradient id="vig" cx="50%" cy="30%" r="90%">
      <stop offset="45%" stop-color="#0e0e11" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0e0e11" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect width="1200" height="630" fill="url(#vig)" />

  <!-- seal -->
  <g transform="translate(600 196)">
    <circle r="58" fill="none" stroke="#c9a227" stroke-width="1.4" />
    <circle r="49" fill="none" stroke="#c9a227" stroke-width="0.75" stroke-dasharray="1 4" stroke-opacity="0.6" />
    <path d="M0 -30 L7 -6 L32 -6 L12 9 L19 33 L0 18 L-19 33 L-12 9 L-32 -6 L-7 -6 Z" fill="#c9a227" />
  </g>

  <!-- overline -->
  <text x="600" y="316" text-anchor="middle" fill="#c9a227" font-family="'IBM Plex Mono', monospace" font-size="20" letter-spacing="7">
    BY INVITATION ONLY
  </text>

  <!-- wordmark -->
  <text x="600" y="404" text-anchor="middle" fill="#f4f1e8" font-family="Georgia, 'Cormorant Garamond', serif" font-size="78" font-weight="500">
    DB Terracrest Advisory
  </text>

  <!-- hairline -->
  <line x1="520" y1="446" x2="680" y2="446" stroke="#c9a227" stroke-opacity="0.5" stroke-width="1" />

  <!-- tagline -->
  <text x="600" y="500" text-anchor="middle" fill="#b0ab9d" font-family="Georgia, serif" font-size="30" font-style="italic">
    The market you were never meant to see.
  </text>

  <text x="600" y="566" text-anchor="middle" fill="#726d61" font-family="'IBM Plex Mono', monospace" font-size="16" letter-spacing="4">
    A PRIVATE DEAL PORTAL · NOT A LISTING SERVICE
  </text>
</svg>
