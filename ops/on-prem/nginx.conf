# DB Terracrest Advisory — internal portal.
# Serves the static React build and reverse-proxies /api to the FastAPI service on
# loopback. Not exposed to the public internet: reachable over the office LAN or a
# client VPN only.

server {
    listen 80;
    server_name portal.terracrest.internal;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.terracrest.internal;

    ssl_certificate     /etc/terracrest/tls/portal.crt;
    ssl_certificate_key /etc/terracrest/tls/portal.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "DENY"             always;
    add_header Referrer-Policy           "no-referrer"      always;

    root /var/www/terracrest;
    index index.html;

    # Static SPA — hashed assets cache hard, index.html never does.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API — proxy to the FastAPI service; it enforces the masking moat server-side.
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 25m;      # document uploads
    }

    # SPA fallback — every non-file route resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
