# Render blueprint — one-click backend + Postgres for DB Terracrest Advisory.
# In Render: New → Blueprint → connect this repo. Then set VITE_API_URL in Vercel
# to the resulting API URL and redeploy the frontend.
services:
  - type: web
    name: terracrest-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: TERRACREST_JWT_SECRET
        generateValue: true
      - key: TERRACREST_CORS_ORIGINS
        value: https://terracrest.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: terracrest-db
          property: connectionString

databases:
  - name: terracrest-db
    plan: free
